<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabs Component Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@base-ui-components/react@1.0.0-beta.0/dist/index.umd.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: {
                            DEFAULT: "hsl(var(--primary))",
                            foreground: "hsl(var(--primary-foreground))",
                        },
                        secondary: {
                            DEFAULT: "hsl(var(--secondary))",
                            foreground: "hsl(var(--secondary-foreground))",
                        },
                        destructive: {
                            DEFAULT: "hsl(var(--destructive))",
                            foreground: "hsl(var(--destructive-foreground))",
                        },
                        muted: {
                            DEFAULT: "hsl(var(--muted))",
                            foreground: "hsl(var(--muted-foreground))",
                        },
                        accent: {
                            DEFAULT: "hsl(var(--accent))",
                            foreground: "hsl(var(--accent-foreground))",
                        },
                        popover: {
                            DEFAULT: "hsl(var(--popover))",
                            foreground: "hsl(var(--popover-foreground))",
                        },
                    },
                },
            },
        }
    </script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --card: 0 0% 100%;
            --card-foreground: 222.2 84% 4.9%;
            --popover: 0 0% 100%;
            --popover-foreground: 222.2 84% 4.9%;
            --primary: 222.2 47.4% 11.2%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96%;
            --secondary-foreground: 222.2 84% 4.9%;
            --muted: 210 40% 96%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --accent: 210 40% 96%;
            --accent-foreground: 222.2 84% 4.9%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 210 40% 98%;
            --border: 214.3 31.8% 91.4%;
            --input: 214.3 31.8% 91.4%;
            --ring: 222.2 84% 4.9%;
        }

        .dark {
            --background: 222.2 84% 4.9%;
            --foreground: 210 40% 98%;
            --card: 222.2 84% 4.9%;
            --card-foreground: 210 40% 98%;
            --popover: 222.2 84% 4.9%;
            --popover-foreground: 210 40% 98%;
            --primary: 210 40% 98%;
            --primary-foreground: 222.2 47.4% 11.2%;
            --secondary: 217.2 32.6% 17.5%;
            --secondary-foreground: 210 40% 98%;
            --muted: 217.2 32.6% 17.5%;
            --muted-foreground: 215 20.2% 65.1%;
            --accent: 217.2 32.6% 17.5%;
            --accent-foreground: 210 40% 98%;
            --destructive: 0 62.8% 30.6%;
            --destructive-foreground: 210 40% 98%;
            --border: 217.2 32.6% 17.5%;
            --input: 217.2 32.6% 17.5%;
            --ring: 212.7 26.8% 83.9%;
        }
    </style>
</head>
<body class="bg-background text-foreground p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Utility function (cn)
        function cn(...classes) {
            return classes.filter(Boolean).join(' ');
        }

        // Tabs Components (from installed file)
        const { Tabs: BaseTabs } = BaseUI;

        const Tabs = React.forwardRef(({ className, ...props }, ref) => (
            React.createElement(BaseTabs.Root, {
                ref,
                className: cn("w-full", className),
                ...props
            })
        ));

        const TabsList = React.forwardRef(({ className, ...props }, ref) => (
            React.createElement(BaseTabs.List, {
                ref,
                className: cn(
                    "inline-flex h-10 items-center justify-center rounded-md p-1 text-muted-foreground z-0",
                    className
                ),
                ...props
            })
        ));

        const TabsTrigger = React.forwardRef(({ className, ...props }, ref) => (
            React.createElement(BaseTabs.Tab, {
                ref,
                className: cn(
                    "inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1.5 text-sm font-medium ring-offset-background transition-all",
                    "focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2",
                    "disabled:pointer-events-none disabled:opacity-50",
                    "data-[selected]:bg-muted data-[selected]:text-foreground data-[selected]:shadow-sm",
                    "hover:text-foreground",
                    className
                ),
                ...props
            })
        ));

        const TabsContent = React.forwardRef(({ className, ...props }, ref) => (
            React.createElement(BaseTabs.Panel, {
                ref,
                className: cn(
                    "mt-2 ring-offset-background",
                    "focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2",
                    className
                ),
                ...props
            })
        ));

        const TabsIndicator = React.forwardRef(({ className, ...props }, ref) => (
            React.createElement(BaseTabs.Indicator, {
                ref,
                className: cn(
                    "absolute bottom-0 left-0 z-10 h-1 w-[var(--active-tab-width)] -translate-y-1/2 translate-x-[var(--active-tab-left)] rounded-sm bg-muted-foreground transition-all duration-200 ease-in-out",
                    className
                ),
                ...props
            })
        ));

        // Test Component
        function TabsTest() {
            const [activeTab, setActiveTab] = useState('overview');

            return React.createElement('div', { className: 'max-w-2xl mx-auto space-y-8' },
                React.createElement('div', null,
                    React.createElement('h1', { className: 'text-3xl font-bold mb-2' }, 'Tabs Component Test'),
                    React.createElement('p', { className: 'text-muted-foreground mb-6' }, 'Testing the tabs component installed via CLI')
                ),

                // Basic Tabs
                React.createElement('section', null,
                    React.createElement('h2', { className: 'text-lg font-semibold mb-3' }, 'Basic Usage'),
                    React.createElement(Tabs, { defaultValue: 'overview', className: 'w-full border border-gray-200 rounded-lg' },
                        React.createElement(TabsList, { className: 'relative border-b' },
                            React.createElement(TabsTrigger, { value: 'overview' }, 'Overview'),
                            React.createElement(TabsTrigger, { value: 'projects' }, 'Projects'),
                            React.createElement(TabsTrigger, { value: 'account' }, 'Account'),
                            React.createElement(TabsIndicator)
                        ),
                        React.createElement(TabsContent, { value: 'overview', className: 'p-4' },
                            React.createElement('h3', { className: 'text-xl font-medium mb-2' }, 'Overview Panel'),
                            React.createElement('p', { className: 'text-muted-foreground' }, 'This is the overview tab content. The indicator should be positioned correctly.')
                        ),
                        React.createElement(TabsContent, { value: 'projects', className: 'p-4' },
                            React.createElement('h3', { className: 'text-xl font-medium mb-2' }, 'Projects Panel'),
                            React.createElement('p', { className: 'text-muted-foreground' }, 'This is the projects tab content.')
                        ),
                        React.createElement(TabsContent, { value: 'account', className: 'p-4' },
                            React.createElement('h3', { className: 'text-xl font-medium mb-2' }, 'Account Panel'),
                            React.createElement('p', { className: 'text-muted-foreground' }, 'This is the account tab content.')
                        )
                    )
                ),

                // Controlled Tabs
                React.createElement('section', null,
                    React.createElement('h2', { className: 'text-lg font-semibold mb-3' }, 'Controlled Tabs'),
                    React.createElement('p', { className: 'text-sm text-muted-foreground mb-3' },
                        'Active tab: ',
                        React.createElement('code', { className: 'bg-muted px-2 py-1 rounded' }, activeTab)
                    ),
                    React.createElement(Tabs, { value: activeTab, onValueChange: setActiveTab, className: 'w-full' },
                        React.createElement(TabsList, { className: 'relative' },
                            React.createElement(TabsTrigger, { value: 'tab1' }, 'Tab 1'),
                            React.createElement(TabsTrigger, { value: 'tab2' }, 'Tab 2'),
                            React.createElement(TabsTrigger, { value: 'tab3', disabled: true }, 'Tab 3 (Disabled)'),
                            React.createElement(TabsIndicator)
                        ),
                        React.createElement(TabsContent, { value: 'tab1' },
                            React.createElement('div', { className: 'p-4 border rounded-lg' },
                                React.createElement('p', null, 'Content for Tab 1. The state is controlled externally.')
                            )
                        ),
                        React.createElement(TabsContent, { value: 'tab2' },
                            React.createElement('div', { className: 'p-4 border rounded-lg' },
                                React.createElement('p', null, 'Content for Tab 2. You can see the active tab in the text above.')
                            )
                        ),
                        React.createElement(TabsContent, { value: 'tab3' },
                            React.createElement('div', { className: 'p-4 border rounded-lg' },
                                React.createElement('p', null, 'This tab is disabled.')
                            )
                        )
                    )
                )
            );
        }

        ReactDOM.render(React.createElement(TabsTest), document.getElementById('root'));
    </script>
</body>
</html>
