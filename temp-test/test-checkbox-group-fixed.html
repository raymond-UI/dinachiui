<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox Group Test - Fixed</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: flex-start;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .checkbox-item:hover {
            background-color: #f3f4f6;
        }
        
        .checkbox {
            width: 1rem;
            height: 1rem;
            border: 2px solid #d1d5db;
            border-radius: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .checkbox[data-checked="true"] {
            background-color: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        
        .check-icon {
            width: 0.75rem;
            height: 0.75rem;
            stroke-width: 2;
        }
    </style>
</head>
<body class="p-8 bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Simple checkbox component for testing
        function Checkbox({ checked, onChange, children, value }) {
            return (
                <div 
                    className="checkbox-item"
                    onClick={() => onChange(!checked)}
                >
                    <div 
                        className="checkbox"
                        data-checked={checked}
                    >
                        {checked && (
                            <svg className="check-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"></path>
                            </svg>
                        )}
                    </div>
                    <span>{children}</span>
                </div>
            );
        }

        // Simple checkbox group component for testing
        function CheckboxGroup({ children, value = [], onChange, className = "" }) {
            const handleCheckboxChange = (checkboxValue, checked) => {
                const newValue = checked 
                    ? [...value, checkboxValue]
                    : value.filter(v => v !== checkboxValue);
                onChange?.(newValue);
            };

            return (
                <div className={`checkbox-group ${className}`}>
                    {React.Children.map(children, child => {
                        if (React.isValidElement(child) && child.props.value) {
                            return React.cloneElement(child, {
                                checked: value.includes(child.props.value),
                                onChange: (checked) => handleCheckboxChange(child.props.value, checked)
                            });
                        }
                        return child;
                    })}
                </div>
            );
        }

        function App() {
            const [selectedItems, setSelectedItems] = useState(['item1']);

            return (
                <div className="max-w-md mx-auto space-y-8">
                    <div>
                        <h1 className="text-2xl font-bold mb-4">Checkbox Group Test - Fixed CLI</h1>
                        <p className="text-gray-600 mb-6">
                            This test verifies that the checkbox-group component was installed correctly 
                            after fixing the CLI dependency issue.
                        </p>
                    </div>

                    <div className="space-y-4">
                        <h2 className="text-lg font-semibold">Select your preferences:</h2>
                        
                        <CheckboxGroup 
                            value={selectedItems}
                            onChange={setSelectedItems}
                        >
                            <Checkbox value="item1">Email notifications</Checkbox>
                            <Checkbox value="item2">SMS alerts</Checkbox>
                            <Checkbox value="item3">Push notifications</Checkbox>
                            <Checkbox value="item4">Newsletter subscription</Checkbox>
                        </CheckboxGroup>

                        <div className="mt-4 p-4 bg-white rounded-lg border">
                            <strong>Selected items:</strong>
                            <div className="mt-2">
                                {selectedItems.length > 0 ? (
                                    <ul className="list-disc list-inside">
                                        {selectedItems.map(item => (
                                            <li key={item}>{item}</li>
                                        ))}
                                    </ul>
                                ) : (
                                    <span className="text-gray-500">None selected</span>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="text-sm text-green-600 font-medium">
                        ✅ CLI Installation Fixed: @base-ui-components/react dependency resolved
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
